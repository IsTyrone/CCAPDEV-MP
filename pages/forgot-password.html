<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password - PC Tracker</title>
    <link rel="icon" type="image/png" href="../assets/images/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../css/auth.css" />
</head>

<body>

    <div class="auth-page">
        <div class="auth-header">
            <a href="../index.html" class="logo"><img src="../assets/images/PC-PICKER-LOGO.png" alt="PC Tracker"
                    style="height: 60px;"></a>
        </div>

        <div class="auth-card">

            <div id="forgotPasswordForm">
                <div class="auth-title">Reset Password</div>
                <p style="color: #666; margin-bottom: 20px; font-size: 0.95em;">Enter your email and new password to
                    reset your account access.</p>

                <form id="forgotPasswordFormElement">
                    <div class="form-group">
                        <label class="form-label">Email address</label>
                        <input type="email" id="resetEmail" class="form-input" placeholder="you@example.com" required />
                    </div>
                    <div class="form-group">
                        <label class="form-label">New Password</label>
                        <input type="password" id="newPassword" class="form-input" placeholder="••••••••" required />
                    </div>
                    <div class="form-group">
                        <label class="form-label">Confirm New Password</label>
                        <input type="password" id="confirmNewPassword" class="form-input" placeholder="••••••••"
                            required />
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">Reset Password</button>
                </form>

                <div class="switch-auth">
                    Remembered it?
                    <a class="switch-link" href="login.html">Sign in</a>
                </div>
            </div>
        </div>

        <a href="../index.html" class="back-link">← Back to Dashboard</a>
    </div>

    <!-- Footer (loaded from shared footer.js) -->
    <div id="footer-placeholder"></div>
    <script src="../js/footer.js"></script>

    <script src="../js/auth.js"></script>
</body>

</html>
