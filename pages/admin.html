<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - PC Tracker</title>
    <link rel="icon" type="image/png" href="../assets/images/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../css/dashboard.css">

</head>

<body>
    <div class="page-wrapper">
        <header class="main-header">
            <a href="../index.html" class="logo-img-container"><img src="../assets/images/PC-PICKER-LOGO.png" class="logo-img" alt="PC Tracker"></a>
            <div class="header-right">
                <span class="account-label">Admin Dashboard</span>
                <button onclick="handleLogout()" class="logout-btn" style="margin-left: 1rem;">Logout</button>
            </div>
        </header>

        <main class="admin-container">
            <div class="admin-header">
                <h2>Admin Dashboard</h2>
                <div class="header-actions">
                    <button class="refresh-btn" onclick="renderListings()">Refresh</button>
                    <button class="refresh-btn" style="background-color: #f44336; margin-left: 10px;"
                        onclick="resetData()">Reset Data</button>
                </div>
            </div>

            <!-- Tabs for Filtering -->
            <div class="admin-tabs">
                <button class="tab-btn active" onclick="switchTab('pending')">Pending</button>
                <button class="tab-btn" onclick="switchTab('approved')">Approved</button>
                <button class="tab-btn" onclick="switchTab('rejected')">Rejected</button>
                <button class="tab-btn" onclick="switchTab('blogs')" style="margin-left: auto; background-color: #1a73e8; color: #fff;">Blog Posts</button>
            </div>

            <div id="listings-container" class="pending-list">
                <!-- Listings will be populated here -->
                <p>Loading...</p>
            </div>

            <!-- Blog Posts Management Section (hidden by default) -->
            <div id="blogs-container" style="display: none;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h3 style="margin: 0;">Manage Blog Posts</h3>
                    <button class="btn-approve" onclick="openCreateBlogModal()">+ New Blog Post</button>
                </div>
                <div id="blog-list">
                    <p>Loading blog posts...</p>
                </div>
            </div>

            <!-- Create Blog Post Modal -->
            <div id="blog-modal" class="modal">
                <div class="modal-content">
                    <span class="close-modal" onclick="closeBlogModal()">&times;</span>
                    <h3>Create Blog Post</h3>
                    <form id="blog-form" onsubmit="submitBlogPost(event)">
                        <div class="form-group">
                            <label for="blog-title">Title</label>
                            <input type="text" id="blog-title" required class="form-control" placeholder="Enter blog title...">
                        </div>

                        <div class="form-group">
                            <label for="blog-body">Body</label>
                            <textarea id="blog-body" required class="form-control" rows="8" placeholder="Write your article content..."></textarea>
                        </div>

                        <div class="form-group">
                            <label for="blog-image">Header Image (optional)</label>
                            <input type="file" id="blog-image" class="form-control" accept="image/*">
                            <img id="blog-image-preview" style="display:none; max-width:100%; margin-top:10px; border-radius:8px;" alt="Preview">
                        </div>

                        <div class="modal-actions">
                            <button type="button" class="btn-cancel" onclick="closeBlogModal()">Cancel</button>
                            <button type="submit" class="btn-save">Publish Post</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Edit Modal -->
            <div id="edit-modal" class="modal">
                <div class="modal-content">
                    <span class="close-modal" onclick="closeEditModal()">&times;</span>
                    <h3>Edit Listing</h3>
                    <form id="edit-form" onsubmit="saveCorrection(event)">
                        <input type="hidden" id="edit-id">

                        <div class="form-group">
                            <label for="edit-price">Price (₱)</label>
                            <input type="number" id="edit-price" required class="form-control">
                        </div>

                        <div class="form-group">
                            <label for="edit-comments">Comments</label>
                            <textarea id="edit-comments" class="form-control" rows="3"></textarea>
                        </div>

                        <!-- Dynamic details can be added here via JS if needed, for now just price/comments -->
                        <div id="edit-details-container"></div>

                        <div class="modal-actions">
                            <button type="button" class="btn-cancel" onclick="closeEditModal()">Cancel</button>
                            <button type="submit" class="btn-save">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Image Modal for Lightbox -->
            <div id="image-modal" style="display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.9);">
                <span class="close-image-modal" onclick="closeImageModal()" style="position: absolute; top: 15px; right: 35px; color: #fff; font-size: 40px; font-weight: bold; cursor: pointer;">&times;</span>
                <img id="expanded-image" style="margin: auto; display: block; max-width: 90%; max-height: 90vh; padding-top: 50px; object-fit: contain;">
            </div>
        </main>
    </div>

    <script>
        // Simple logout for admin
        async function handleLogout() {
            try {
                await fetch('/api/auth/logout', { method: 'POST' });
            } catch (err) {
                console.error('Logout error:', err);
            }
            window.location.href = 'login.html';
        }
    </script>
    <script src="../js/admin.js"></script>
</body>

</html>
