<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register Page - PC Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../css/auth.css" />
</head>

<body>
    <div class="auth-page">
        <div class="auth-header">
            <a href="../index.html" class="logo"><img src="../assets/images/PC-PICKER-LOGO.png" alt="PC Tracker"
                    style="height: 60px;"></a>
        </div>

        <div class="auth-card register-card" id="FormCard">
            <div class="auth-title">Create an Account</div>
            <form id="registerFormElement">
                <div class="register-columns">
                    <!-- Left Column: Personal Info -->
                    <div class="register-col">
                        <div class="form-group names-group">
                            <label for="lastName" class="form-label">Last Name</label>
                            <input type="text" id="lastName" class="form-input" placeholder="Doe" required />
                        </div>
                        <div class="form-group">
                            <label for="firstName" class="form-label">First Name</label>
                            <input type="text" id="firstName" class="form-input" placeholder="John" required />
                        </div>
                        <div class="form-group">
                            <label for="middleName" class="form-label">Middle Name</label>
                            <input type="text" id="middleName" class="form-input" placeholder="Morgan" />
                        </div>
                        <div class="form-group">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" id="username" class="form-input" placeholder="johndoe123" required />
                        </div>
                    </div>

                    <!-- Right Column: Contact & Security -->
                    <div class="register-col">
                        <div class="form-group phone-group">
                            <label class="form-label">Phone Number</label>
                            <div class="phone-input-row">
                                <span class="phone-prefix">(+63)</span>
                                <input type="text" class="form-input" placeholder="912 345 6789" />
                            </div>
                        </div>
                        <div class="form-group email-group">
                            <label for="email" class="form-label">Email Address</label>
                            <input type="email" id="email" class="form-input" placeholder="john.doe@example.com"
                                required />
                        </div>
                        <div class="form-group">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" id="password" class="form-input" placeholder="••••••••" required />
                        </div>
                        <div class="form-group">
                            <label for="confirmPassword" class="form-label">Confirm Password</label>
                            <input type="password" id="confirmPassword" class="form-input" placeholder="••••••••"
                                required />
                        </div>
                    </div>
                </div>

                <div class="RegButtons">
                    <button type="submit" class="submit-button btn-primary btn-full">Register</button>
                    <button type="reset" class="reset-button btn-full" style="margin-top: 8px;">Clear all
                        Fields</button>
                </div>
                <div class="return-group switch-auth">
                    Already have an account?
                    <a href="login.html" class="switch-link">Sign in</a>
                </div>
            </form>
        </div>

        <a href="../index.html" class="back-link">← Back to Dashboard</a>
    </div>

    <!-- Footer (loaded from shared footer.js) -->
    <div id="footer-placeholder"></div>
    <script src="../js/footer.js"></script>
    <script src="../js/register.js"></script>
</body>

</html>
